# S-Matrix - Apache Doris 4.0 Docker Compose
# Simplified topology: 1 FE + 1 BE for local development and integration.

services:
  smatrix-fe:
    image: apache/doris:fe-4.0.5
    container_name: smatrix-fe
    hostname: smatrix-fe
    restart: always
    environment:
      - FE_SERVERS=fe1:192.168.100.2:9010
      - FE_ID=1
    ports:
      - "38030:8030" # FE HTTP
      - "39030:9030" # FE MySQL
      - "39010:9010" # FE internal communication
    volumes:
      - ./data/fe/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./data/fe/log:/opt/apache-doris/fe/log
    networks:
      smatrix-network:
        ipv4_address: 192.168.100.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/bootstrap"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  smatrix-be:
    image: apache/doris:be-4.0.5
    container_name: smatrix-be
    hostname: smatrix-be
    restart: always
    entrypoint:
      - /opt/apache-doris/be_entrypoint.sh
      - smatrix-fe
    depends_on:
      smatrix-fe:
        condition: service_healthy
    environment:
      - HOST_TYPE=FQDN
      - SKIP_CHECK_ULIMIT=true
    ports:
      - "38040:8040" # BE HTTP
      - "39050:9050" # BE heartbeat
      - "39060:9060" # BE thrift
    volumes:
      - doris_be_storage:/opt/apache-doris/be/storage
      - ./data/be/log:/opt/apache-doris/be/log
    networks:
      smatrix-network:
        ipv4_address: 192.168.100.3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  smatrix-api:
    build: ./doris-api
    container_name: smatrix-api
    restart: always
    ports:
      - "38018:8000"
    networks:
      smatrix-network:
        ipv4_address: 192.168.100.4
    depends_on:
      smatrix-fe:
        condition: service_healthy
      smatrix-be:
        condition: service_healthy
    environment:
      - DORIS_HOST=smatrix-fe
      - DORIS_PORT=9030
      - DORIS_USER=root
      - DORIS_PASSWORD=
      - DORIS_DATABASE=doris_db
      - DORIS_STREAM_LOAD_HOST=smatrix-be
      - DORIS_STREAM_LOAD_PORT=8040
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SMATRIX_API_KEY=${SMATRIX_API_KEY}
      - SMATRIX_CORS_ORIGINS=${SMATRIX_CORS_ORIGINS:-http://localhost:35173}
      - DC_NLQ_DEFAULT_KERNEL=${DC_NLQ_DEFAULT_KERNEL:-auto}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  smatrix-frontend:
    build:
      context: ./doris-frontend
      dockerfile: Dockerfile
    container_name: smatrix-frontend
    restart: always
    environment:
      - SMATRIX_API_KEY=${SMATRIX_API_KEY}
    ports:
      - "35173:80"
    networks:
      smatrix-network:
        ipv4_address: 192.168.100.5
    depends_on:
      smatrix-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1/ >/dev/null
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

networks:
  smatrix-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1

volumes:
  doris_be_storage:
    name: doris_be_storage
